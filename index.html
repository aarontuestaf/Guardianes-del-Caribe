<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Guardianes del Caribe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <div id="game-container"></div>

    <!-- Créditos: autores del juego -->
    <aside id="credits" aria-label="Autores">
      <div class="credits-title">UN JUEGO DE</div>
      <ul class="credits-list">
        <li>Aaron Wilson</li>
        <li>Valerie Méndez</li>
        <li>Braila Chalas</li>
        <li>Fhénix Jiménez</li>
        <li>Adakeisha Rosa</li>
      </ul>
    </aside>

    <div id="touch-controls" aria-hidden="true">
      <div class="dpad">
        <button class="dpad-btn up" data-dir="up" aria-label="Arriba">▲</button>
        <button class="dpad-btn left" data-dir="left" aria-label="Izquierda">◀</button>
        <button class="dpad-btn right" data-dir="right" aria-label="Derecha">▶</button>
        <button class="dpad-btn down" data-dir="down" aria-label="Abajo">▼</button>
      </div>
    </div>
  </div>

  <!-- Phaser 3 -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <!-- Game scenes -->
  <script src="scenes/BootScene.js"></script>
  <script src="scenes/MenuScene.js"></script>
  <script src="scenes-extra.js"></script>

  <!-- Game config -->
  <script src="main.js"></script>
</body>
</html>
